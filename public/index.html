<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashNote</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>FlashNote</h1>
      <button id="new-note-btn" title="New note">+</button>
    </div>
    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search notes..." />
    </div>
    <nav id="note-list"></nav>
  </aside>

  <div id="overlay"></div>

  <main id="editor-pane">
    <div id="editor-header">
      <button id="menu-btn" title="菜单">&#9776;</button>
      <input type="text" id="title-input" placeholder="笔记标题" />
      <span id="save-status"></span>
    </div>
    <div id="md-toolbar">
      <button title="一级标题" data-md="h1">H1</button>
      <button title="二级标题" data-md="h2">H2</button>
      <button title="三级标题" data-md="h3">H3</button>
      <button title="四级标题" data-md="h4">H4</button>
      <button title="五级标题" data-md="h5">H5</button>
      <button title="六级标题" data-md="h6">H6</button>
      <span class="md-sep"></span>
      <button title="粗体" data-md="bold"><b>B</b></button>
      <button title="斜体" data-md="italic"><i>I</i></button>
      <button title="删除线" data-md="strike"><s>S</s></button>
      <button title="行内代码" data-md="code">&lt;/&gt;</button>
      <span class="md-sep"></span>
      <button title="引用" data-md="quote">&#8220;</button>
      <button title="无序列表" data-md="ul">&#9632;</button>
      <button title="有序列表" data-md="ol">1.</button>
      <button title="任务列表" data-md="task">&#9744;</button>
      <span class="md-sep"></span>
      <button title="分隔线" data-md="hr">&mdash;</button>
      <button title="代码块" data-md="codeblock">&#123;&#123;</button>
      <button title="链接" data-md="link">&#128279;</button>
      <button title="图片" data-md="image">&#128247;</button>
      <button title="表格" data-md="table">&#9638;</button>
    </div>
    <textarea id="editor" placeholder="开始记录生活中的美好瞬间"></textarea>
  </main>

  <script src="/app.js"></script>
</body>
</html>
