<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashNote</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>FlashNote</h1>
      <button id="new-note-btn" title="New note">+</button>
    </div>
    <div id="search-box">
      <input type="text" id="search-input" placeholder="Search notes..." />
    </div>
    <nav id="note-list"></nav>
  </aside>

  <main id="editor-pane">
    <div id="editor-header">
      <input type="text" id="title-input" placeholder="笔记标题" />
      <span id="save-status"></span>
    </div>
    <textarea id="editor" placeholder="开始记录生活中的美好瞬间"></textarea>
  </main>

  <script src="/app.js"></script>
</body>
</html>
